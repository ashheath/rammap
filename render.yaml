services:
  - type: web_service
    name: ram-locator-backend
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile

  - type: static_site
    name: ram-locator-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    plan: free

databases:
  - name: ram-locator-db
    type: postgres
    plan: free
    # Render will provision a managed Postgres instance for this project.
    # Note: if you require PostGIS, verify that the managed DB supports PostGIS
    # or use an external provider that exposes the extension.
