version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Add any other env vars here or use an env_file
    networks:
      - web
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    networks:
      - web
    restart: unless-stopped

  caddy:
    image: caddy:2
    # Changed host ports to avoid collision with existing proxy on 80/443.
    # If you prefer Caddy not to publish any host ports (use existing proxy only),
    # remove the `ports` section entirely.
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
